<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="40%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="60%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </radialGradient>
    <radialGradient id="core" cx="45%" cy="42%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="50%" stop-color="rgba(253,224,71,0.7)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>
  </defs>

  <!-- Sun rays -->
  <g stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round">
    <line x1="64" y1="4" x2="64" y2="22"/>
    <line x1="64" y1="106" x2="64" y2="124"/>
    <line x1="4" y1="64" x2="22" y2="64"/>
    <line x1="106" y1="64" x2="124" y2="64"/>
    <line x1="21.6" y1="21.6" x2="34.3" y2="34.3"/>
    <line x1="93.7" y1="93.7" x2="106.4" y2="106.4"/>
    <line x1="106.4" y1="21.6" x2="93.7" y2="34.3"/>
    <line x1="34.3" y1="93.7" x2="21.6" y2="106.4"/>
  </g>

  <!-- Main sun circle -->
  <circle cx="64" cy="64" r="42" fill="url(#bg)"/>

  <!-- Bright core -->
  <circle cx="64" cy="64" r="24" fill="url(#core)"/>
</svg>
