name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish tag
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm exec changeset tag
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Chrome zip
        if: steps.changesets.outputs.published == 'true'
        run: pnpm zip

      - name: Build Firefox + sources zip
        if: steps.changesets.outputs.published == 'true'
        run: pnpm zip:firefox

      - name: Attach zips to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[0].version')
          gh release upload "v${VERSION}" \
            ".output/sunshine-extension-${VERSION}-chrome.zip" \
            ".output/sunshine-extension-${VERSION}-firefox.zip" \
            ".output/sunshine-extension-${VERSION}-sources.zip" \
            --clobber
